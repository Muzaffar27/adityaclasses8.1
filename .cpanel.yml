deployment:
  tasks:
    # 1. Sync all Laravel code to your project folder
    - export DEPLOYPATH=/home/adityaclasses/adityaclasses_project/
    - /bin/rsync -avz --exclude='.git' --exclude='storage' ./ $DEPLOYPATH

    # 2. Sync the entire public folder to public_html
    - /bin/rsync -avz --exclude='.git' $DEPLOYPATH/public/ /home/adityaclasses/public_html/
